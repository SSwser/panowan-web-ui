services:
  api:
    build:
      target: dev-api
    environment:
      DEV_MODE: "1"
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./data/runtime:/app/runtime
    restart: "no"

  worker-panowan:
    build:
      target: dev-worker-panowan
    environment:
      DEV_MODE: "1"
      UV_LINK_MODE: copy
    volumes:
      - panowan-uv-cache:/root/.cache/uv
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./third_party/PanoWan:/engines/panowan
      - ./third_party/Upscale:/engines/upscale
      - ${MODEL_ROOT:-./data/models}:/models
      - ./data/runtime:/app/runtime
    restart: "no"

  frontend:
    build:
      target: dev-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

volumes:
  panowan-uv-cache:
  frontend-node-modules:
