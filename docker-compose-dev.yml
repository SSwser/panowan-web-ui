services:
  api:
    build:
      target: dev-api
    environment:
      DEV_MODE: "1"
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./data/runtime:/app/runtime
    restart: "no"

  worker-panowan:
    build:
      target: dev-worker-panowan
    environment:
      DEV_MODE: "1"
      UV_LINK_MODE: copy
    volumes:
      - panowan-uv-cache:/root/.cache/uv
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./third_party/PanoWan:/engines/panowan
      - ${MODEL_ROOT:-./data/models}:/models
      - ./data/runtime:/app/runtime
    restart: "no"

  model-setup:
    build:
      target: dev-worker-panowan
    volumes:
      - panowan-uv-cache:/root/.cache/uv
      - ./scripts:/app/scripts
      - ./third_party/PanoWan:/engines/panowan
      - ${MODEL_ROOT:-./data/models}:/models

volumes:
  panowan-uv-cache:
