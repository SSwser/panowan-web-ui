services:
  api:
    build:
      context: .
      target: api
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        PYPI_INDEX: ${PYPI_INDEX:-}
    image: panowan-api:${TAG:-latest}
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      SERVICE_ROLE: api
      HOST: 0.0.0.0
      RUNTIME_DIR: /app/runtime
      JOB_BACKEND: local
    volumes:
      - ./data/runtime:/app/runtime
    restart: unless-stopped

  worker-panowan:
    build:
      context: .
      target: worker-panowan
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        PYPI_INDEX: ${PYPI_INDEX:-}
    image: panowan-worker-panowan:${TAG:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      SERVICE_ROLE: worker
      ENGINE: panowan
      CAPABILITIES: t2v,i2v,upscale
      RUNTIME_DIR: /app/runtime
      MODEL_ROOT: /models
      PANOWAN_ENGINE_DIR: /engines/panowan
      JOB_BACKEND: local
      TORCH_CUDNN_V8_API_ENABLED: "1"
      CUDA_MODULE_LOADING: LAZY
    volumes:
      - ${MODEL_ROOT:-./data/models}:/models
      - ./data/runtime:/app/runtime
    gpus: all
    restart: unless-stopped

  model-setup:
    build:
      context: .
      target: worker-panowan
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        PYPI_INDEX: ${PYPI_INDEX:-}
    image: panowan-worker-panowan:${TAG:-latest}
    profiles: ["setup"]
    command: ["bash", "/app/scripts/model-setup.sh"]
    env_file:
      - path: .env
        required: false
    environment:
      MODEL_ROOT: /models
      PANOWAN_ENGINE_DIR: /engines/panowan
    volumes:
      - ${MODEL_ROOT:-./data/models}:/models
