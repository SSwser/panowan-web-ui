services:
  panowan:
    build:
      context: .
    image: panowan
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      TORCH_CUDNN_V8_API_ENABLED: "1"
      CUDA_MODULE_LOADING: LAZY
    volumes:
      - ${MODEL_ROOT:-./data/models}:/app/PanoWan/models
      - ./data/runtime:/app/runtime
    gpus: all
    restart: unless-stopped
