<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PanoWan — 任务管理</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6efe4;
        --panel: rgba(255, 250, 242, 0.9);
        --panel-strong: #fff7ed;
        --ink: #1f2937;
        --muted: #6b7280;
        --accent: #be5b2d;
        --accent-soft: rgba(190, 91, 45, 0.12);
        --success: #1f7a4d;
        --success-soft: rgba(31, 122, 77, 0.10);
        --error: #a11d33;
        --error-soft: rgba(161, 29, 51, 0.10);
        --queued-soft: rgba(190, 91, 45, 0.10);
        --border: rgba(31, 41, 55, 0.12);
        --shadow: 0 24px 60px rgba(65, 37, 20, 0.14);
      }

      /* ── dialog / preview ── */
      dialog {
        border: none;
        border-radius: 20px;
        padding: 0;
        max-width: min(860px, 95vw);
        width: 100%;
        box-shadow: 0 32px 80px rgba(0,0,0,0.35);
        background: #1a1a1a;
        color: #f0ece6;
      }
      dialog::backdrop { background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); }
      .dialog-inner { display: flex; flex-direction: column; }
      .dialog-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 18px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .dialog-header h3 { margin: 0; font-size: 0.9rem; font-weight: 700; color: #e0d8cc; }
      .dialog-close {
        background: rgba(255,255,255,0.1); border: none; border-radius: 999px;
        color: #ccc; cursor: pointer; font-size: 1.1rem; line-height: 1;
        padding: 4px 10px; transition: background 120ms;
      }
      .dialog-close:hover { background: rgba(255,255,255,0.18); }
      .dialog-video { width: 100%; display: block; aspect-ratio: 2/1; background: #000; }
      .dialog-meta {
        padding: 12px 18px; font-size: 0.8rem; color: #8a8070; line-height: 1.6;
        border-top: 1px solid rgba(255,255,255,0.08);
      }
      .dialog-meta strong { color: #cfc8be; }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(190, 91, 45, 0.16), transparent 32%),
          radial-gradient(circle at bottom right, rgba(31, 122, 77, 0.12), transparent 28%),
          linear-gradient(160deg, #f7efe5 0%, #f3e7d4 44%, #efe6dc 100%);
        padding: 24px;
      }

      main {
        width: min(1000px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
        backdrop-filter: blur(20px);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 28px 32px 18px;
        background: linear-gradient(135deg, rgba(190, 91, 45, 0.12), rgba(31, 122, 77, 0.08));
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 3.5vw, 2.8rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .hero p { margin: 0; color: var(--muted); font-size: 0.95rem; line-height: 1.6; }

      .submit-area {
        padding: 22px 32px 28px;
        display: grid;
        gap: 14px;
      }

      label { display: block; font-size: 0.88rem; font-weight: 700; margin-bottom: 6px; }

      textarea, input[type=text], input[type=number], select {
        width: 100%;
        border: 1px solid rgba(31, 41, 55, 0.18);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.85);
        color: var(--ink);
        padding: 10px 14px;
        font: inherit;
      }

      textarea { min-height: 100px; resize: vertical; }

      /* ── quality row ── */
      .quality-row {
        display: flex; gap: 8px; flex-wrap: wrap;
      }
      .quality-btn {
        flex: 1; min-width: 90px; text-align: center;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        background: rgba(255,255,255,0.7);
        padding: 8px 4px;
        cursor: pointer;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--muted);
        transition: border-color 140ms, color 140ms, background 140ms;
      }
      .quality-btn:hover { border-color: var(--accent); color: var(--accent); }
      .quality-btn.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent);
      }
      .quality-btn small { display: block; font-weight: 400; font-size: 0.72rem; margin-top: 2px; }

      /* ── params grid ── */
      .params-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
      }
      .params-grid label { margin-bottom: 4px; }

      /* ── advanced toggle ── */
      .adv-toggle {
        background: none; border: none; padding: 0;
        font: inherit; font-size: 0.83rem; color: var(--muted);
        cursor: pointer; text-decoration: underline dotted;
        text-align: left;
      }
      .adv-section { display: none; }
      .adv-section.open { display: block; }

      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 20px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease;
        background: var(--accent);
        color: white;
        box-shadow: 0 10px 22px rgba(190, 91, 45, 0.22);
      }

      button:disabled { opacity: 0.55; cursor: wait; }
      button:hover:not(:disabled) { transform: translateY(-1px); }

      button.secondary {
        background: var(--accent-soft);
        color: var(--accent);
        box-shadow: none;
      }

      .submit-status {
        font-size: 0.9rem;
        color: var(--muted);
      }

      /* --- history section --- */
      .history-header {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 18px 32px 12px;
        border-bottom: 1px solid var(--border);
        gap: 12px;
      }

      .history-header h2 {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }

      .history-header .auto-badge {
        margin-left: auto;
        font-size: 0.78rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .auto-badge .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--success);
        animation: pulse 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .dot.idle { background: var(--muted); animation: none; }

      /* --- worker summary --- */
      .worker-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px;
        padding: 16px 20px;
      }
      .worker-card {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 14px 16px;
        background: var(--surface, rgba(31, 41, 55, 0.025));
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
      }
      .worker-card span {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }
      .worker-card strong {
        font-size: 1.4rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: var(--fg, inherit);
      }
      @media (max-width: 720px) {
        .worker-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }

      .btn-clear-failed {
        font-size: 0.76rem;
        padding: 4px 12px;
        border: 1px solid var(--error);
        border-radius: 6px;
        color: var(--error);
        background: transparent;
        cursor: pointer;
        transition: background 150ms, color 150ms;
        font-family: inherit;
      }
      .btn-clear-failed:hover { background: var(--error-soft); }
      .btn-clear-failed:disabled { opacity: 0.4; cursor: default; }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }

      thead th {
        text-align: left;
        padding: 8px 14px;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--muted);
        background: rgba(31, 41, 55, 0.035);
        font-weight: 700;
      }

      tbody tr {
        border-top: 1px solid var(--border);
        transition: background 120ms;
      }

      tbody tr:hover { background: rgba(190, 91, 45, 0.04); }

      td { padding: 10px 14px; vertical-align: middle; }

      .col-id { font-family: "Cascadia Code", "JetBrains Mono", monospace; font-size: 0.82rem; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .col-prompt { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
      .col-params { white-space: nowrap; color: var(--muted); font-size: 0.8rem; font-family: "Cascadia Code", "JetBrains Mono", monospace; }
      .col-time { white-space: nowrap; font-size: 0.82rem; color: var(--muted); }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.78rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .badge::before {
        content: "";
        width: 7px; height: 7px;
        border-radius: 50%;
        background: currentColor;
      }

      .badge-queued  { color: var(--accent);  background: var(--queued-soft); }
      .badge-running { color: var(--accent);  background: var(--queued-soft); }
      .badge-completed { color: var(--success); background: var(--success-soft); }
      .badge-failed  { color: var(--error);   background: var(--error-soft); }
      .badge-unknown { color: var(--muted);   background: rgba(31,41,55,0.07); }

      .download-btn, .preview-btn {
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 700;
        border-radius: 999px;
        padding: 4px 12px;
        transition: transform 120ms;
        cursor: pointer;
        border: none;
        font-family: inherit;
      }

      .action-buttons {
        display: inline-flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 6px;
        white-space: nowrap;
      }

      .download-btn {
        color: var(--accent);
        background: var(--accent-soft);
      }

      .preview-btn {
        color: var(--success);
        background: var(--success-soft);
        margin-right: 6px;
      }

      .download-btn:hover, .preview-btn:hover { transform: translateY(-1px); }

      .error-text { color: var(--error); font-size: 0.82rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      .empty-row td { text-align: center; color: var(--muted); padding: 28px; }

      /* ── comparison preview ── */
      .compare-tabs {
        display: flex; gap: 0; border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .compare-tab {
        flex: 1; text-align: center; padding: 8px 0; font-size: 0.78rem; font-weight: 700;
        background: rgba(255,255,255,0.03); border: none; color: #8a8070; cursor: pointer;
        transition: color 120ms, background 120ms;
      }
      .compare-tab:hover { background: rgba(255,255,255,0.06); }
      .compare-tab.active { color: #e0d8cc; background: rgba(255,255,255,0.08); }

      .compare-side-by-side {
        display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      }
      .compare-side-by-side video { width: 100%; display: block; }

      .compare-toggle-wrap { position: relative; }
      .compare-toggle-btns {
        display: flex; gap: 6px; justify-content: center; padding: 8px 0;
      }
      .compare-toggle-btn {
        padding: 4px 14px; border-radius: 999px; font-size: 0.78rem; font-weight: 700;
        border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
        color: #8a8070; cursor: pointer;
      }
      .compare-toggle-btn.active { color: #e0d8cc; border-color: var(--accent); background: rgba(190,91,45,0.15); }

      .compare-slider-wrap { position: relative; user-select: none; }
      .compare-slider-wrap canvas { display: block; width: 100%; }
      .compare-slider-line {
        position: absolute; top: 0; bottom: 0; width: 2px;
        background: var(--accent); cursor: ew-resize; z-index: 2;
      }
      .compare-slider-label {
        position: absolute; top: 6px; font-size: 0.68rem; font-weight: 700; color: rgba(255,255,255,0.6);
      }
      .compare-slider-label.left { left: 8px; }
      .compare-slider-label.right { right: 8px; }
      .compare-frame-nav {
        display: flex; justify-content: center; gap: 8px; padding: 6px 0;
      }
      .compare-frame-nav button {
        padding: 3px 10px; font-size: 0.72rem; border-radius: 8px;
        background: rgba(255,255,255,0.08); border: none; color: #8a8070; cursor: pointer;
      }

      .table-wrap { overflow-x: auto; }

      @media (max-width: 720px) {
        .hero, .submit-area, .history-header { padding-left: 18px; padding-right: 18px; }
        .col-prompt, .col-time, .col-params { display: none; }
      }
    </style>
  </head>
  <body>
    <!-- Video preview dialog -->
    <dialog id="preview-dialog">
      <div class="dialog-inner">
        <div class="dialog-header">
          <h3 id="dialog-title">视频预览</h3>
          <button class="dialog-close" id="dialog-close-btn">✕</button>
        </div>
        <div id="compare-tabs-bar" class="compare-tabs" style="display:none;">
          <button class="compare-tab active" data-compare="side-by-side">并排对比</button>
          <button class="compare-tab" data-compare="toggle">A/B 切换</button>
          <button class="compare-tab" data-compare="slider">滑块对比</button>
        </div>
        <div id="preview-content">
          <video class="dialog-video" id="dialog-video" controls loop></video>
        </div>
        <div class="dialog-meta" id="dialog-meta"></div>
      </div>
    </dialog>

    <!-- Upscale dialog -->
    <dialog id="upscale-dialog">
      <div class="dialog-inner" style="background:var(--panel-strong);color:var(--ink);">
        <div class="dialog-header" style="border-bottom:1px solid var(--border);">
          <h3 id="upscale-title" style="color:var(--ink);">提升画质</h3>
          <button class="dialog-close" id="upscale-close-btn" style="background:var(--accent-soft);color:var(--accent);">✕</button>
        </div>
        <div style="padding:18px 22px;">
          <p id="upscale-source-info" style="font-size:0.85rem;color:var(--muted);margin:0 0 14px;"></p>

          <label style="font-size:0.85rem;">超分模型</label>
          <select id="upscale-model" style="margin-bottom:14px;">
            <option value="realesrgan-animevideov3">Real-ESRGAN (快速)</option>
            <option value="realbasicvsr">RealBasicVSR (高质量)</option>
            <option value="seedvr2-3b">SeedVR2-3B (SOTA)</option>
          </select>

          <label style="font-size:0.85rem;">缩放方式</label>
          <div class="quality-row" style="margin-bottom:14px;">
            <button type="button" class="quality-btn active" data-scale-mode="factor">按倍率</button>
            <button type="button" class="quality-btn" data-scale-mode="resolution">指定分辨率</button>
          </div>

          <div id="upscale-factor-section">
            <label style="font-size:0.85rem;">缩放倍率</label>
            <select id="upscale-scale">
              <option value="2">2x</option>
              <option value="4">4x</option>
            </select>
          </div>

          <div id="upscale-resolution-section" style="display:none;">
            <div class="params-grid">
              <div>
                <label style="font-size:0.85rem;">目标宽度</label>
                <input type="number" id="upscale-target-w" min="32" step="32">
              </div>
              <div>
                <label style="font-size:0.85rem;">目标高度</label>
                <input type="number" id="upscale-target-h" min="32" step="32">
              </div>
            </div>
          </div>

          <p id="upscale-hint" style="font-size:0.78rem;color:var(--muted);margin-top:10px;"></p>

          <div class="row" style="margin-top:18px;">
            <button id="upscale-cancel-btn" class="secondary" type="button">取消</button>
            <button id="upscale-submit-btn" type="button">开始提升</button>
          </div>
          <span id="upscale-status" class="submit-status"></span>
        </div>
      </div>
    </dialog>

    <main>
      <!-- Submit panel -->
      <div class="panel">
        <section class="hero">
          <h1>PanoWan 视频生成</h1>
          <p>提交文本描述，异步生成全景视频。历史任务会自动刷新，完成后可预览或下载。</p>
        </section>
        <div class="submit-area">
          <div>
            <label for="prompt">Prompt</label>
            <textarea id="prompt">A cinematic alpine valley at sunset with drifting clouds and wide panoramic motion.</textarea>
          </div>

          <div>
            <label>质量预设</label>
            <div class="quality-row">
              <button type="button" class="quality-btn" data-quality="draft">
                草稿
                <small>20步 · 448×224</small>
              </button>
              <button type="button" class="quality-btn active" data-quality="standard">
                标准
                <small>50步 · 896×448</small>
              </button>
              <button type="button" class="quality-btn" data-quality="custom">
                自定义
                <small>手动设置</small>
              </button>
            </div>
          </div>

          <div id="custom-params" style="display:none">
            <div class="params-grid">
              <div>
                <label for="num-steps">推理步数</label>
                <input type="number" id="num-steps" min="1" max="150" value="50">
              </div>
              <div>
                <label for="resolution">分辨率</label>
                <select id="resolution">
                  <option value="448x224">448×224　草稿</option>
                  <option value="640x320">640×320　小</option>
                  <option value="896x448" selected>896×448　标准</option>
                  <option value="1280x640">1280×640　高清 ⚠</option>
                  <option value="custom">自定义…</option>
                </select>
              </div>
              <div>
                <label for="seed">随机种子</label>
                <input type="number" id="seed" min="0" value="0">
              </div>
            </div>
            <div id="custom-res" style="display:none; margin-top:10px">
              <div class="params-grid">
                <div>
                  <label for="custom-width">宽度（px，16 的倍数）</label>
                  <input type="number" id="custom-width" min="64" step="16" value="896">
                </div>
                <div>
                  <label for="custom-height">高度（px，建议 = 宽 ÷ 2）</label>
                  <input type="number" id="custom-height" min="32" step="16" value="448">
                </div>
              </div>
            </div>
          </div>

          <div>
            <button type="button" class="adv-toggle" id="adv-toggle">▸ 负向提示词</button>
            <div class="adv-section" id="adv-section">
              <textarea id="negative-prompt" style="min-height:72px; margin-top:8px" placeholder="overly colorful, overexposed, static..."></textarea>
            </div>
          </div>

          <div class="row">
            <button id="submit-btn" type="button">提交任务</button>
            <span id="submit-status" class="submit-status"></span>
          </div>
        </div>
      </div>

      <!-- History panel -->
      <div class="panel">
        <div id="worker-summary" class="worker-summary" aria-live="polite">
          <div class="worker-card"><span>已知 Worker</span><strong id="workers-total">-</strong></div>
          <div class="worker-card"><span>在线 Worker</span><strong id="workers-online">-</strong></div>
          <div class="worker-card"><span>生成中 Worker</span><strong id="workers-busy">-</strong></div>
          <div class="worker-card"><span>卡在取消</span><strong id="workers-stuck-cancelling">-</strong></div>
          <div class="worker-card"><span>可用容量</span><strong id="workers-available-capacity">-</strong></div>
          <div class="worker-card"><span>排队任务</span><strong id="jobs-queued">-</strong></div>
          <div class="worker-card"><span>生成中任务</span><strong id="jobs-running">-</strong></div>
        </div>
        <div class="history-header">
          <h2>历史任务</h2>
          <button id="clear-failed-btn" class="btn-clear-failed">清理失败任务</button>
          <span class="auto-badge">
            <span id="poll-dot" class="dot"></span>
            <span id="poll-label">自动刷新中</span>
          </span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Job ID</th>
                <th>状态</th>
                <th class="col-prompt">Prompt</th>
                <th class="col-params">参数</th>
                <th class="col-time">提交时间</th>
                <th class="col-time">耗时</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="job-table-body">
              <tr class="empty-row"><td colspan="7">加载中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      const submitBtn = document.getElementById("submit-btn");
      const promptInput = document.getElementById("prompt");
      const submitStatus = document.getElementById("submit-status");
      const tbody = document.getElementById("job-table-body");
      const pollDot = document.getElementById("poll-dot");
      const pollLabel = document.getElementById("poll-label");
      const previewDialog = document.getElementById("preview-dialog");
      const dialogVideo = document.getElementById("dialog-video");
      const dialogTitle = document.getElementById("dialog-title");
      const dialogMeta = document.getElementById("dialog-meta");
      const customParams = document.getElementById("custom-params");
      const customResolution = document.getElementById("custom-res");
      const resolutionSelect = document.getElementById("resolution");

      let selectedQuality = "standard";

      class JobEventSource {
        constructor() {
          this.es = null;
          this.reconnectTimer = null;
        }

        connect() {
          this.es = new EventSource("/jobs/events");

          this.es.addEventListener("job_created", (e) => {
            const job = JSON.parse(e.data);
            _jobCache[job.job_id] = job;
            this._renderIncremental();
          });

          this.es.addEventListener("job_updated", (e) => {
            const patch = JSON.parse(e.data);
            const id = patch.job_id;
            if (_jobCache[id]) {
              Object.assign(_jobCache[id], patch);
            } else {
              _jobCache[id] = patch;
            }
            this._renderIncremental();
          });

          this.es.addEventListener("job_deleted", (e) => {
            const { job_id } = JSON.parse(e.data);
            delete _jobCache[job_id];
            this._renderIncremental();
          });

          this.es.onerror = () => {
            this.es.close();
            this.es = null;
            this.scheduleReconnect();
          };
        }

        _renderIncremental() {
          const jobs = Object.values(_jobCache);
          jobs.sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
          renderTable(jobs);
          const busy = jobs.some(j => j.status === "queued" || j.status === "running");
          setPollingIndicator(busy);
          refreshWorkerSummary();
        }

        scheduleReconnect() {
          if (this.reconnectTimer) return;
          this.reconnectTimer = setTimeout(() => {
            this.reconnectTimer = null;
            fetchJobs().then(jobs => {
              if (jobs) {
                renderTable(jobs);
                this.connect();
              }
            });
          }, 5000);
        }
      }

      function formatDuration(seconds, suffix = "") {
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = seconds % 60;
        const base = minutes > 0 ? `${minutes}m ${remainingSeconds}s` : `${remainingSeconds}s`;
        return suffix ? `${base} ${suffix}` : base;
      }

      function openPreview(job) {
        if (job.type === "upscale" && job.source_job_id) {
          // Comparison mode: find source job
          compareUpscaleJob = job;
          compareSourceJob = _jobCache[job.source_job_id] || null;
          document.getElementById("compare-tabs-bar").style.display = "";

          document.querySelector('[data-compare="side-by-side"]').classList.add("active");

          renderComparison();
        } else {
          // Single video mode
          compareSourceJob = null;
          compareUpscaleJob = null;
          document.getElementById("compare-tabs-bar").style.display = "none";
          const url = job.download_url || `/jobs/${job.job_id}/download`;
          document.getElementById("preview-content").innerHTML =
            `<video class="dialog-video" id="dialog-video" controls loop src="${url}"></video>`;
          dialogTitle.textContent = `预览 — ${job.job_id.slice(0, 8)}…`;

        const p = job.params || {};
        const parts = [];
        if (p.num_inference_steps) parts.push(`${p.num_inference_steps} 步`);
        if (p.width && p.height) parts.push(`${p.width}×${p.height}`);
        if (p.seed !== undefined && p.seed !== null) parts.push(`seed ${p.seed}`);
        if (job.upscale_params) {
          parts.push(`${job.upscale_params.model}`);
          parts.push(`${job.upscale_params.scale}x`);
        }
        let duration = "";
        const startedAt = durationStartTime(job);
        if (startedAt && job.finished_at) {
          const secs = Math.round((new Date(job.finished_at) - startedAt) / 1000);
          duration = formatDuration(secs);
        }
        dialogMeta.innerHTML =
          `<strong>Prompt:</strong> ${escapeHtml(job.prompt || "")}<br>` +
          (parts.length ? `<strong>参数:</strong> ${parts.join(" · ")}` : "") +
          (duration ? ` &nbsp;·&nbsp; <strong>耗时:</strong> ${duration}` : "");

      // ── comparison preview ──
      let compareMode = "side-by-side";
      let compareSourceJob = null;
      let compareUpscaleJob = null;

      document.querySelectorAll(".compare-tab").forEach(tab => {
        tab.addEventListener("click", () => {

      function renderComparison() {
        const content = document.getElementById("preview-content");
        if (!compareSourceJob || !compareUpscaleJob) {

        const srcUrl = `/jobs/${compareSourceJob.job_id}/download`;

        if (compareMode === "side-by-side") {
          content.innerHTML = `
            <div class="compare-side-by-side">
              <div>
                <video src="${srcUrl}" controls loop class="dialog-video" id="compare-vid-a"></video>

              </div>
              <div>
                <video src="${upUrl}" controls loop class="dialog-video" id="compare-vid-b"></video>
                <div style="text-align:center;font-size:0.72rem;color:#8a8070;padding:4px;">超分</div>
              </div>
            </div>`;
          // Sync playback
          const vidA = document.getElementById("compare-vid-a");
          const vidB = document.getElementById("compare-vid-b");
          if (vidA && vidB) syncVideos(vidA, vidB);
        } else if (compareMode === "toggle") {
          content.innerHTML = `
            <div class="compare-toggle-wrap">
              <div class="compare-toggle-btns">
                <button class="compare-toggle-btn active" id="toggle-a-btn">A 原始</button>

          const vid = document.getElementById("compare-toggle-vid");

          let currentSrc = "a";

            vid.src = srcUrl; vid.currentTime = time; if (!paused) vid.play();
            currentSrc = "a"; btnA.classList.add("active"); btnB.classList.remove("active");
          });
          btnB.addEventListener("click", () => {
            if (currentSrc === "b") return;
            const time = vid.currentTime; const paused = vid.paused;
            vid.src = upUrl; vid.currentTime = time; if (!paused) vid.play();
            currentSrc = "b"; btnB.classList.add("active"); btnA.classList.remove("active");
          });
          // Keyboard shortcuts
          const handleKey = (e) => {
            if (e.key === "a" || e.key === "A") btnA.click();
            if (e.key === "b" || e.key === "B") btnB.click();
          };
          document.addEventListener("keydown", handleKey);
          previewDialog.addEventListener("close", () => document.removeEventListener("keydown", handleKey), { once: true });
        } else if (compareMode === "slider") {
          content.innerHTML = `
            <div class="compare-slider-wrap">
              <canvas id="compare-canvas"></canvas>
              <div class="compare-slider-line" id="slider-line" style="left:50%;"></div>
              <span class="compare-slider-label left">原始</span>
              <span class="compare-slider-label right">超分</span>
            </div>
            <div class="compare-frame-nav">
              <button id="slider-prev-frame">◀ 上一帧</button>
              <span id="slider-frame-info" style="font-size:0.72rem;color:#8a8070;padding:3px 8px;">帧 0/0</span>
              <button id="slider-next-frame">下一帧 ▶</button>
            </div>`;
          initSliderComparison(srcUrl, upUrl);
        }
      }

      function syncVideos(vidA, vidB) {
        vidA.addEventListener("play", () => { if (vidB.paused) vidB.play(); });
        vidB.addEventListener("play", () => { if (vidA.paused) vidA.play(); });
        vidA.addEventListener("pause", () => { if (!vidB.paused) vidB.pause(); });
        vidB.addEventListener("pause", () => { if (!vidA.paused) vidA.pause(); });
        vidA.addEventListener("seeked", () => { vidB.currentTime = vidA.currentTime; });
      }

      function initSliderComparison(srcUrl, upUrl) {
        const canvas = document.getElementById("compare-canvas");
        const ctx = canvas.getContext("2d");
        const line = document.getElementById("slider-line");
        let splitPos = 0.5;

        // Create offscreen videos
        const vidA = document.createElement("video"); vidA.src = srcUrl; vidA.preload = "auto"; vidA.muted = true;
        const vidB = document.createElement("video"); vidB.src = upUrl; vidB.preload = "auto"; vidB.muted = true;

        vidA.addEventListener("loadeddata", () => {
          canvas.width = vidA.videoWidth || 896;
          canvas.height = vidA.videoHeight || 448;
          vidA.currentTime = 0; vidB.currentTime = 0;
          drawSliderFrame();
        });

        function drawSliderFrame() {
          const w = canvas.width, h = canvas.height;
          const splitX = Math.round(w * splitPos);
          ctx.clearRect(0, 0, w, h);
          // Left: original
          ctx.drawImage(vidA, 0, 0, splitX, h, 0, 0, splitX, h);
          // Right: upscaled
          ctx.drawImage(vidB, splitX, 0, w - splitX, h, splitX, 0, w - splitX, h);
          line.style.left = `${splitPos * 100}%`;
        }

        // Drag slider
        let dragging = false;
        line.addEventListener("mousedown", () => { dragging = true; });
        document.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          const rect = canvas.getBoundingClientRect();
          splitPos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
          drawSliderFrame();
        });
        document.addEventListener("mouseup", () => { dragging = false; });

        // Frame navigation
        const frameStep = 1 / 24; // assume 24fps
        document.getElementById("slider-prev-frame").addEventListener("click", () => {
          vidA.currentTime = Math.max(0, vidA.currentTime - frameStep);
          vidB.currentTime = vidA.currentTime;
          vidA.addEventListener("seeked", drawSliderFrame, { once: true });
          updateFrameInfo();
        });
        document.getElementById("slider-next-frame").addEventListener("click", () => {
          vidA.currentTime = Math.min(vidA.duration, vidA.currentTime + frameStep);
          vidB.currentTime = vidA.currentTime;
          vidA.addEventListener("seeked", drawSliderFrame, { once: true });
          updateFrameInfo();
        });

        function updateFrameInfo() {
          const frame = Math.round(vidA.currentTime * 24);
          const total = Math.round(vidA.duration * 24);
          document.getElementById("slider-frame-info").textContent = `帧 ${frame}/${total}`;
        }
      }

      // ── upscale dialog ──
      const upscaleDialog = document.getElementById("upscale-dialog");

      // Scale mode toggle
      document.querySelectorAll("[data-scale-mode]").forEach(btn => {

      // Model hint updates
      const MODEL_HINTS = {
        "realesrgan-animevideov3": "Real-ESRGAN: 逐帧处理，速度快，无时序一致性。推荐 2x。",
        "realbasicvsr": "RealBasicVSR: 双向传播，时序一致性好。仅支持 4x。",

      function openUpscaleDialog(job) {

      document.getElementById("upscale-submit-btn").addEventListener("click", async () => {
        if (!upscaleSourceJobId) return;
        const body = { source_job_id: upscaleSourceJobId };
        body.model = document.getElementById("upscale-model").value;
        const mode = document.querySelector("[data-scale-mode].active").dataset.scaleMode;
        if (mode === "factor") {
          body.scale = parseInt(document.getElementById("upscale-scale").value);
        } else {
          body.target_width = parseInt(document.getElementById("upscale-target-w").value) || undefined;
          body.target_height = parseInt(document.getElementById("upscale-target-h").value) || undefined;
        }
        const statusEl = document.getElementById("upscale-status");

      // ── cancel job ──
      async function cancelJob(jobId) {
        try {
          const res = await fetch(`/jobs/${jobId}/cancel`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });
          const payload = await res.json();
          if (!res.ok && res.status !== 202) {
            throw new Error(payload.detail || `HTTP ${res.status}`);
          }
          if (payload.job_id) {
            _jobCache[payload.job_id] = payload;
            sseClient._renderIncremental();
          }
        } catch (err) {
          alert(`取消失败: ${err}`);
        }

      async function escalateCancel(jobId) {
        if (!confirm("确认强制取消？该操作可能导致 worker 被标记不健康。")) return;
        try {
          const res = await fetch(`/jobs/${jobId}/cancel/escalate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });
          const payload = await res.json();
          if (!res.ok && res.status !== 202) {
            throw new Error(payload.detail || `HTTP ${res.status}`);
          }

      const clearFailedBtn = document.getElementById("clear-failed-btn");
      clearFailedBtn.addEventListener("click", async () => {

      // ── utilities ──
      function formatTime(iso) {
        if (!iso) return "-";
        try {
          const d = new Date(iso);
          const now = new Date();
          const sameDay = d.toDateString() === now.toDateString();
          const time = d.toLocaleTimeString("zh-CN", { hour12: false, hour: "2-digit", minute: "2-digit" });
          if (sameDay) return time;
          return d.toLocaleDateString("zh-CN", { month: "numeric", day: "numeric" }) + " " + time;
        } catch {
          return iso;
        }
      }

      function createdAtCell(job) {
        return formatTime(job.created_at);
      }

      function durationStartTime(job) {
        return job.started_at ? new Date(job.started_at) : null;
      }

      function durationCell(job) {
        const startTime = durationStartTime(job);
        if (!startTime) return "-";

        const endTime = job.finished_at ? new Date(job.finished_at) : new Date();
        const secs = Math.round((endTime - startTime) / 1000);

        if (job.status === "completed" || job.status === "failed") {
          return formatDuration(secs);
        } else if (job.status === "running") {
          return formatDuration(secs, "运行中");
        }
        return "-";
      }

      function statusBadge(status) {
        const label = {
          "queued": "排队中", "claimed": "排队中", "running": "生成中",
          "cancelling": "正在取消", "succeeded": "已完成", "failed": "失败", "cancelled": "已取消",
        }[status] || status;
        const cls = {
          "queued": "queued", "claimed": "queued", "running": "running",
          "cancelling": "running", "succeeded": "completed", "failed": "failed", "cancelled": "failed",
        }[status] || "unknown";
        return `<span class="badge badge-${cls}">${label}</span>`;
      }

      function paramsCell(job) {
        const p = job.params || {};
        if (!p.num_inference_steps && !p.width) return `<span class="col-params" style="color:var(--border)">—</span>`;
        const parts = [];
        if (p.num_inference_steps) parts.push(`${p.num_inference_steps}步`);
        if (p.width && p.height) parts.push(`${p.width}×${p.height}`);
        if (p.seed !== undefined && p.seed !== null) parts.push(`seed ${p.seed}`);
        return `<span class="col-params">${parts.join(" ")}</span>`;
      }

      function actionCell(job) {
        const parts = [];
        if (job.status === "succeeded") {
          parts.push(`<button class="preview-btn" data-job-id="${escapeHtml(job.job_id)}">预览</button>`);
          if (job.type === "upscale") {
            const srcId = job.source_job_id || "";
            parts.push(`<a class="download-btn" href="/jobs/${escapeHtml(srcId)}/download" download="${escapeHtml(srcId)}.mp4">下载原视频</a>`);
            parts.push(`<a class="download-btn" href="/jobs/${escapeHtml(job.job_id)}/download" download="${escapeHtml(job.job_id)}.mp4" style="background:var(--success-soft);color:var(--success);">下载超分</a>`);
          } else {
            const url = job.download_url || `/jobs/${job.job_id}/download`;
            parts.push(`<a class="download-btn" href="${url}" download="${escapeHtml(job.job_id)}.mp4">下载</a>`);
          }
          parts.push(`<button class="preview-btn" data-action="upscale" data-job-id="${escapeHtml(job.job_id)}" style="background:var(--queued-soft);color:var(--accent);">提升画质</button>`);
        } else if (job.status === "queued" || job.status === "claimed" || job.status === "running") {
          parts.push(`<button class="preview-btn" data-action="cancel" data-job-id="${escapeHtml(job.job_id)}" style="background:var(--error-soft);color:var(--error);">取消</button>`);
        } else if (job.status === "cancelling") {
          parts.push(`<span class="badge badge-running">正在取消…</span>`);
          parts.push(`<button class="preview-btn" data-action="retry-cancel" data-job-id="${escapeHtml(job.job_id)}">重试取消</button>`);
          parts.push(`<button class="preview-btn" data-action="escalate-cancel" data-job-id="${escapeHtml(job.job_id)}" style="background:var(--error-soft);color:var(--error);">确认强制取消</button>`);
        } else if (job.status === "failed" && job.error) {
          parts.push(`<span class="error-text" title="${escapeHtml(job.error)}">${escapeHtml(job.error)}</span>`);
        }
        if (job.type === "upscale" && job.source_job_id) {
          parts.unshift(`<span style="font-size:0.72rem;color:var(--muted);">↑ ${escapeHtml(job.source_job_id.slice(0,6))}…</span>`);
        }
        return parts.length ? `<span class="action-buttons">${parts.join(" ")}</span>` : "-";
      }

      function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
      }

      let _jobCache = {};
      tbody.addEventListener("click", event => {
        const previewBtn = event.target.closest('[data-action="preview"], .preview-btn:not([data-action])');
        const upscaleBtn = event.target.closest('[data-action="upscale"]');
        const cancelBtn = event.target.closest('[data-action="cancel"]');
        const retryCancelBtn = event.target.closest('[data-action="retry-cancel"]');
        const escalateBtn = event.target.closest('[data-action="escalate-cancel"]');

        if (previewBtn) {
          const job = _jobCache[previewBtn.dataset.jobId];
          if (job) openPreview(job);
          return;
        }
        if (upscaleBtn) {
          const job = _jobCache[upscaleBtn.dataset.jobId];
          if (job) openUpscaleDialog(job);
          return;
        }
        if (cancelBtn) {
          cancelJob(cancelBtn.dataset.jobId);
          return;
        }
        if (retryCancelBtn) {
          cancelJob(retryCancelBtn.dataset.jobId);
          return;
        }
        if (escalateBtn) {
          escalateCancel(escalateBtn.dataset.jobId);
          return;
        }
      });

      function renderTable(jobs) {
        jobs.forEach(j => { _jobCache[j.job_id] = j; });

        if (!jobs || jobs.length === 0) {
          tbody.innerHTML = `<tr class="empty-row"><td colspan="7">暂无任务，提交一个试试吧。</td></tr>`;
          return;
        }

        const rows = jobs.map(job => `
          <tr>
            <td class="col-id" title="${escapeHtml(job.job_id)}">${escapeHtml(job.job_id)}</td>
            <td>${statusBadge(job.status)}</td>
            <td class="col-prompt" title="${escapeHtml(job.prompt || '')}">${escapeHtml(job.prompt || "-")}</td>
            <td>${paramsCell(job)}</td>
            <td class="col-time">${createdAtCell(job)}</td>
            <td class="col-time">${durationCell(job)}</td>
            <td>${actionCell(job)}</td>
          </tr>
        `).join("");
        tbody.innerHTML = rows;
      }

      // ── polling ──
      function hasActiveJobs(jobs) {
        return jobs.some(j => j.status === "queued" || j.status === "running");
      }

      function setPollingIndicator(active) {
        pollDot.className = "dot" + (active ? "" : " idle");
        pollLabel.textContent = active ? "自动刷新中" : "无活跃任务，已暂停刷新";
      }

      async function fetchJobs() {
        try {
          const res = await fetch("/jobs");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (err) {
          console.warn("fetchJobs error:", err);
          return null;
        }
      }

      async function refreshWorkerSummary() {
        try {
          const res = await fetch("/workers/summary");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const summary = await res.json();
          document.getElementById("workers-total").textContent = String(summary.known_workers ?? "-");
          document.getElementById("workers-online").textContent = String(summary.online_workers ?? "-");
          document.getElementById("workers-busy").textContent = String(summary.busy_workers ?? "-");
          document.getElementById("workers-stuck-cancelling").textContent = String(summary.stuck_cancelling_workers ?? "-");
          document.getElementById("workers-available-capacity").textContent = String(summary.effective_available_capacity ?? "-");
          document.getElementById("jobs-queued").textContent = String(summary.queued_jobs ?? "-");
          document.getElementById("jobs-running").textContent = String(summary.running_jobs ?? "-");
        } catch {
          document.getElementById("workers-total").textContent = "-";
          document.getElementById("workers-online").textContent = "-";
          document.getElementById("workers-busy").textContent = "-";
          document.getElementById("workers-stuck-cancelling").textContent = "-";
          document.getElementById("workers-available-capacity").textContent = "-";
          document.getElementById("jobs-queued").textContent = "-";
          document.getElementById("jobs-running").textContent = "-";
        }
      }

      async function refreshJobs() {
        const jobs = await fetchJobs();
        if (jobs !== null) {
          renderTable(jobs);
          const busy = hasActiveJobs(jobs);
          setPollingIndicator(busy);
        }
      }

      // ── submit ──
      submitBtn.addEventListener("click", async () => {
        const prompt = promptInput.value.trim();
        if (!prompt) { submitStatus.textContent = "请填写 Prompt"; return; }

        submitBtn.disabled = true;
        submitStatus.textContent = "提交中…";

        const body = { prompt };

        if (selectedQuality === "custom") {
          const steps = parseInt(document.getElementById("num-steps").value);
          const seed = parseInt(document.getElementById("seed").value);
          if (steps > 0) body.num_inference_steps = steps;
          body.seed = seed;

          const resVal = resolutionSelect.value;
          if (resVal === "custom") {
            const w = parseInt(document.getElementById("custom-width").value);
            const h = parseInt(document.getElementById("custom-height").value);
            if (w > 0) body.width = w;
            if (h > 0) body.height = h;
          } else {
            const [w, h] = resVal.split("x").map(Number);
            body.width = w;
            body.height = h;
          }
        } else {
          body.quality = selectedQuality;
        }

        const negPrompt = document.getElementById("negative-prompt").value.trim();
        if (negPrompt) body.negative_prompt = negPrompt;

        try {
          const res = await fetch("/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const payload = await res.json();

          if (!res.ok) {
            submitStatus.textContent = `提交失败: ${payload.detail || res.status}`;
            return;
          }

          submitStatus.textContent = `✓ 任务 ${payload.job_id} 已加入队列`;
          refreshJobs();
        } catch (err) {
          submitStatus.textContent = `网络错误: ${err}`;
        } finally {
          submitBtn.disabled = false;
        }
      });

      // ── tick: update duration for running/queued jobs every second ──
      setInterval(() => {
        const activeJobs = Object.values(_jobCache).filter(j => j.status === "running" || j.status === "queued");
        if (activeJobs.length === 0) return;
        const rows = tbody.querySelectorAll("tr");
        rows.forEach(row => {
          const idCell = row.querySelector(".col-id");
          if (!idCell) return;
          const jobId = idCell.getAttribute("title");
          const job = _jobCache[jobId];
          if (!job || (job.status !== "running" && job.status !== "queued")) return;
          // Update duration cell (5th column, 0-indexed = col 5)
          const cells = row.querySelectorAll("td");
          if (cells.length >= 6) {
            cells[5].textContent = durationCell(job);
          }
        });
      }, 1000);

      // ── init: full load then SSE ──
      refreshJobs().then(() => {
        sseClient.connect();
      });
      refreshWorkerSummary();
    </script>
  </body>
</html>
